spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/wordsprint?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.wordsprint: info

jwt:
  secret: replace-with-your-secret-key-at-least-32-characters
  expire-hours: 24
